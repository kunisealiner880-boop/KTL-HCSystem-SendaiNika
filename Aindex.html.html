<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tonle Sap Survey - Lite</title>
    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <style>
        :root { --main-green: #27ae60; --main-blue: #2980b9; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: #f4f7f6; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; background: white; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .header { text-align: center; border-bottom: 2px solid var(--main-green); padding-bottom: 10px; margin-bottom: 20px; }
        .house-id-badge { background: #e8f5e9; color: var(--main-green); padding: 5px 15px; border-radius: 20px; font-weight: bold; display: inline-block; }
        .menu-card { border: 1px solid #ddd; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        button { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; color: white; cursor: pointer; }
        .btn-green { background: var(--main-green); }
        .btn-blue { background: var(--main-blue); }
        .btn-outline { background: none; border: 1px solid #ccc; color: #666; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        #map { width: 100%; height: 300px; border-radius: 12px; margin-top: 10px; border: 1px solid #ddd; }
        .hidden { display: none; }
        .history-item { border-bottom: 1px solid #eee; padding: 15px 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Tonle Sap Project</h1>
        <div id="display-house-id" class="house-id-badge">House ID: Loading...</div>
    </div>

    <!-- メイン画面 -->
    <div id="view-main">
        <div class="menu-card" style="border-left:8px solid var(--main-green)">
            <h3>住民の方へ / សម្រាប់អ្នកភូមិ</h3>
            <button class="btn-green" onclick="window.open('YouTubeのURL', '_blank')">動画を見る (Video)</button>
        </div>
        <button class="btn-outline" onclick="checkAuth()">調査員ログイン</button>
    </div>

    <!-- 調査員メニュー -->
    <div id="view-researcher" class="hidden">
        <div class="menu-card" style="border-left:8px solid var(--main-blue)">
            <h3>調査員メニュー</h3>
            <button class="btn-blue" onclick="showView('view-form')">新規記録</button>
            <button class="btn-outline" onclick="showView('view-history')">履歴とマップ</button>
            <button class="btn-outline" onclick="location.reload()">ログアウト</button>
        </div>
    </div>

    <!-- フォーム -->
    <div id="view-form" class="hidden">
        <h3>新規調査</h3>
        <input type="text" id="inspector" placeholder="担当者名">
        <textarea id="notes" rows="4" placeholder="調査メモ（雨樋の状態など）"></textarea>
        <button class="btn-blue" id="save-btn" onclick="submitSurvey()">保存</button>
        <button class="btn-outline" onclick="showView('view-researcher')">戻る</button>
    </div>

    <!-- 履歴 -->
    <div id="view-history" class="hidden">
        <h3>調査履歴マップ</h3>
        <div id="map"></div>
        <div id="history-list"></div>
        <button class="btn-outline" onclick="showView('view-researcher')">戻る</button>
    </div>
</div>

<script>
    // Firebase設定（自分のものに書き換えてください）
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT_ID.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const urlParams = new URLSearchParams(window.location.search);
    const houseId = urlParams.get('id') || 'TEST-001';
    document.getElementById('display-house-id').innerText = `House ID: ${houseId}`;

    let map;

    function showView(id) {
        document.querySelectorAll('.container > div[id^="view-"]').forEach(v => v.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        if(id === 'view-history') initMap();
    }

    function checkAuth() {
        if(prompt("パスワード:") === "tonlesap2026") showView('view-researcher');
    }

    function initMap() {
        if(!map) {
            map = L.map('map').setView([12.5, 104.1], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        }
        loadHistory();
    }

    function loadHistory() {
        const list = document.getElementById('history-list');
        list.innerText = "読み込み中...";
        db.collection("logs").where("houseId", "==", houseId).orderBy("timestamp", "desc").get().then(snap => {
            list.innerHTML = "";
            let coords = [];
            snap.forEach(doc => {
                const d = doc.data();
                const date = d.timestamp?.toDate().toLocaleString() || '不明';
                L.marker([d.lat, d.lng]).addTo(map).bindPopup(`${date}<br>${d.note}`);
                coords.push([d.lat, d.lng]);

                const item = document.createElement('div');
                item.className = 'history-item';
                item.innerHTML = `<b>${date}</b><br>担当: ${d.inspector}<br>${d.note}`;
                list.appendChild(item);
            });
            if(coords.length > 0) map.fitBounds(coords);
        });
    }

    function submitSurvey() {
        const inspector = document.getElementById('inspector').value;
        const note = document.getElementById('notes').value;
        if(!inspector) return alert("名前を入力してください");

        document.getElementById('save-btn').disabled = true;

        navigator.geolocation.getCurrentPosition(pos => {
            db.collection("logs").add({
                houseId, inspector, note,
                lat: pos.coords.latitude,
                lng: pos.coords.longitude,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                alert("保存成功");
                location.reload();
            });
        }, () => alert("GPSエラー"), {enableHighAccuracy: true});
    }
</script>
</body>
</html>
